<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Login | NutriTrack</title>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #4ade80;
            --primary-dark: #22c55e;
            --bg-body: #f8fafc;
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Plus Jakarta Sans', sans-serif;
        }

        body{
            background: radial-gradient(circle at top right, rgba(74, 222, 128, 0.1), #f8fafc);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:20px;
        }

        .container{
            background:white;
            width:100%;
            max-width:500px;
            padding:3rem;
            border-radius:30px;
            box-shadow:0 25px 50px -12px rgba(0,0,0,0.08);
        }

        h2{
            text-align:center;
            font-size:2rem;
            margin-bottom:10px;
            color:var(--text-main);
        }

        .subtitle{
            text-align:center;
            color:var(--text-muted);
            margin-bottom:2rem;
        }

        .tabs{
            display:flex;
            gap:10px;
            margin-bottom:2rem;
        }

        .tabs button{
            flex:1;
            padding:1rem;
            border:none;
            border-radius:15px;
            font-weight:700;
            cursor:pointer;
            transition:0.3s;
        }

        .active{
            background:var(--primary);
            color:white;
        }

        .inactive{
            background:#f1f5f9;
            color:var(--text-muted);
        }

        .category-grid{
            display:grid;
            grid-template-columns:repeat(2,1fr);
            gap:12px;
            margin-bottom:2rem;
        }

        .category-card{
            border:2px solid #f1f5f9;
            padding:18px;
            border-radius:15px;
            cursor:pointer;
            transition:0.3s;
            text-align:center;
        }

        .category-card input{
            display:none;
        }

        /* ÍCONES NOVOS */
        .icon{
            width:42px;
            height:42px;
            margin:0 auto 10px;
            border-radius:12px;
            display:flex;
            align-items:center;
            justify-content:center;
            background:#f8fafc;
        }

        .icon svg{
            width:22px;
            height:22px;
            stroke:var(--text-main);
        }

        .category-card p{
            font-size:0.82rem;
            font-weight:700;
            color:var(--text-muted);
        }

        .category-card:has(input:checked){
            border-color:var(--primary);
            background:rgba(74, 222, 128, 0.05);
        }

        .category-card:has(input:checked) .icon{
            background:rgba(74, 222, 128, 0.15);
        }

        .input-group{
            margin-bottom:1rem;
        }

        .input-label{
            font-size:0.75rem;
            font-weight:800;
            color:var(--text-muted);
            text-transform:uppercase;
            margin-left:5px;
        }

        input{
            width:100%;
            padding:1rem;
            border:1.5px solid #e2e8f0;
            border-radius:15px;
            background:#f8fafc;
            margin-top:5px;
            outline:none;
            transition:0.3s;
        }

        input:focus{
            border-color:var(--primary);
            background:white;
            box-shadow:0 0 0 4px rgba(74,222,128,0.1);
        }

        .main-btn{
            width:100%;
            padding:1.2rem;
            background:var(--text-main);
            color:white;
            border:none;
            border-radius:15px;
            font-weight:700;
            font-size:1rem;
            cursor:pointer;
            transition:0.3s;
            margin-top:1rem;
        }

        .main-btn:hover{
            background:black;
            transform:translateY(-2px);
        }

        .hidden{
            display:none;
        }

        .msg{
            margin-top:1rem;
            text-align:center;
            font-weight:700;
            opacity:1;
            transition:0.3s;
        }

        .success{
            color:#16a34a;
        }

        .error{
            color:#dc2626;
        }
    </style>
</head>
<body>

<div class="container">

    <h2>NutriTrack</h2>
    <p class="subtitle">Cadastro e Login com sistema</p>

    <div class="tabs">
        <button id="btnCadastro" class="active">Cadastrar</button>
        <button id="btnLogin" class="inactive">Entrar</button>
    </div>

    <!-- CADASTRO -->
    <div id="cadastroArea">

        <div class="category-grid">

            <label class="category-card">
                <input type="radio" name="perfil" value="fitness" checked>

                <div class="icon">
                    <svg fill="none" viewBox="0 0 24 24" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round"
                        d="M14.25 6.087c0-.621.504-1.125 1.125-1.125h1.5c.621 0 1.125.504 1.125 1.125v2.326a1.125 1.125 0 01-.33.795l-1.72 1.72m-7.4 7.4-1.72 1.72a1.125 1.125 0 01-.795.33H3.712A1.125 1.125 0 012.587 19.5v-1.5c0-.621.504-1.125 1.125-1.125h2.326a1.125 1.125 0 00.795-.33l7.417-7.417a1.125 1.125 0 000-1.59l-1.788-1.788a1.125 1.125 0 00-1.59 0L3.455 13.167"/>
                    </svg>
                </div>

                <p>Fitness</p>
            </label>

            <label class="category-card">
                <input type="radio" name="perfil" value="dia-a-dia">

                <div class="icon">
                    <svg fill="none" viewBox="0 0 24 24" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round"
                        d="M3 9.75L12 4l9 5.75V20a1 1 0 01-1 1h-5.25v-6h-5.5v6H4a1 1 0 01-1-1V9.75z"/>
                    </svg>
                </div>

                <p>Dia a dia</p>
            </label>

            <label class="category-card">
                <input type="radio" name="perfil" value="tratamento">

                <div class="icon">
                    <svg fill="none" viewBox="0 0 24 24" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round"
                        d="M12 6v12m6-6H6"/>
                    </svg>
                </div>

                <p>Tratamento</p>
            </label>

            <label class="category-card">
                <input type="radio" name="perfil" value="performance">

                <div class="icon">
                    <svg fill="none" viewBox="0 0 24 24" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round"
                        d="M13.5 4.5L21 12l-7.5 7.5M3 12h18"/>
                    </svg>
                </div>

                <p>Performance</p>
            </label>

        </div>

        <div class="input-group">
            <label class="input-label">E-mail</label>
            <input type="email" id="cadEmail" placeholder="Digite seu e-mail">
        </div>

        <div class="input-group">
            <label class="input-label">Senha</label>
            <input type="password" id="cadSenha" placeholder="Digite sua senha">
        </div>

        <button class="main-btn" onclick="cadastrar()">
            Criar Conta
        </button>

    </div>

    <!-- LOGIN -->
    <div id="loginArea" class="hidden">

        <div class="input-group">
            <label class="input-label">E-mail</label>
            <input type="email" id="loginEmail" placeholder="Digite seu e-mail">
        </div>

        <div class="input-group">
            <label class="input-label">Senha</label>
            <input type="password" id="loginSenha" placeholder="Digite sua senha">
        </div>

        <button class="main-btn" onclick="entrar()">
            Entrar
        </button>

    </div>

    <div id="mensagem" class="msg"></div>

</div>

<script>

    const btnCadastro = document.getElementById("btnCadastro");
    const btnLogin = document.getElementById("btnLogin");
    const cadastroArea = document.getElementById("cadastroArea");
    const loginArea = document.getElementById("loginArea");
    const mensagem = document.getElementById("mensagem");

    // MOSTRAR MENSAGEM E SUMIR EM 3 SEGUNDOS
    function mostrarMensagem(texto, tipo){

        mensagem.innerHTML = texto;
        mensagem.className = "msg " + tipo;
        mensagem.style.opacity = "1";

        setTimeout(() => {
            mensagem.style.opacity = "0";

            setTimeout(() => {
                mensagem.innerHTML = "";
                mensagem.className = "msg";
            }, 300);

        }, 3000);
    }

    // RESETAR FORMULÁRIOS
    function resetarFormularios() {

        mensagem.innerHTML = "";
        mensagem.className = "msg";

        document.getElementById("cadEmail").value = "";
        document.getElementById("cadSenha").value = "";
        document.getElementById("loginEmail").value = "";
        document.getElementById("loginSenha").value = "";
    }

    // ABA CADASTRO
    btnCadastro.onclick = () => {

        cadastroArea.classList.remove("hidden");
        loginArea.classList.add("hidden");

        btnCadastro.className = "active";
        btnLogin.className = "inactive";

        resetarFormularios();
    }

    // ABA LOGIN
    btnLogin.onclick = () => {

        loginArea.classList.remove("hidden");
        cadastroArea.classList.add("hidden");

        btnLogin.className = "active";
        btnCadastro.className = "inactive";

        resetarFormularios();
    }

    // CADASTRAR
    function cadastrar(){

        const email = document.getElementById("cadEmail").value.trim();
        const senha = document.getElementById("cadSenha").value;
        const perfil = document.querySelector('input[name="perfil"]:checked').value;

        if(email === "" || senha === ""){
            mostrarMensagem("Preencha todos os campos.", "error");
            return;
        }

        const usuariosCadastrados =
            JSON.parse(localStorage.getItem("usuarios")) || [];

        const emailExiste =
            usuariosCadastrados.some(user => user.email === email);

        if(emailExiste){
            mostrarMensagem("Este e-mail já está cadastrado.", "error");
            return;
        }

        const novoUsuario = {
            email: email,
            senha: senha,
            perfil: perfil
        };

        usuariosCadastrados.push(novoUsuario);

        localStorage.setItem(
            "usuarios",
            JSON.stringify(usuariosCadastrados)
        );

        // MENSAGEM
        mostrarMensagem("Conta criada com sucesso!", "success");

        // LIMPA INPUTS
        document.getElementById("cadEmail").value = "";
        document.getElementById("cadSenha").value = "";

        // VAI DIRETO PARA LOGIN
        setTimeout(() => {

            loginArea.classList.remove("hidden");
            cadastroArea.classList.add("hidden");

            btnLogin.className = "active";
            btnCadastro.className = "inactive";

            // já joga o email no login
            document.getElementById("loginEmail").value = email;

        }, 1200);
    }

    // LOGIN
    function entrar(){

        const email = document.getElementById("loginEmail").value.trim();
        const senha = document.getElementById("loginSenha").value;

        if(email === "" || senha === ""){
            mostrarMensagem("Preencha todos os campos.", "error");
            return;
        }

        const usuariosCadastrados =
            JSON.parse(localStorage.getItem("usuarios")) || [];

        const usuarioEncontrado =
            usuariosCadastrados.find(
                user => user.email === email && user.senha === senha
            );

        if(usuarioEncontrado){

            mostrarMensagem(
                "Login realizado com sucesso!",
                "success"
            );

            sessionStorage.setItem(
                "usuarioLogado",
                JSON.stringify(usuarioEncontrado)
            );

            setTimeout(() => {
                window.location.href = "index.html";
            }, 1500);

        } else {

            mostrarMensagem(
                "E-mail ou senha incorretos.",
                "error"
            );
        }
    }

</script>

</body>
</html>
