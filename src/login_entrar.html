<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Login | NutriTrack</title>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #4ade80;
            --primary-dark: #22c55e;
            --bg-body: #f8fafc;
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Plus Jakarta Sans', sans-serif;
        }

        body{
            background: radial-gradient(circle at top right, rgba(74, 222, 128, 0.1), #f8fafc);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:20px;
        }

        .container{
            background:white;
            width:100%;
            max-width:500px;
            padding:3rem;
            border-radius:30px;
            box-shadow:0 25px 50px -12px rgba(0,0,0,0.08);
        }

        h2{
            text-align:center;
            font-size:2rem;
            margin-bottom:10px;
            color:var(--text-main);
        }

        .subtitle{
            text-align:center;
            color:var(--text-muted);
            margin-bottom:2rem;
        }

        .tabs{
            display:flex;
            gap:10px;
            margin-bottom:2rem;
        }

        .tabs button{
            flex:1;
            padding:1rem;
            border:none;
            border-radius:15px;
            font-weight:700;
            cursor:pointer;
            transition:0.3s;
        }

        .active{
            background:var(--primary);
            color:white;
        }

        .inactive{
            background:#f1f5f9;
            color:var(--text-muted);
        }

        .category-grid{
            display:grid;
            grid-template-columns:repeat(2,1fr);
            gap:12px;
            margin-bottom:2rem;
        }

        .category-card{
            border:2px solid #f1f5f9;
            padding:15px;
            border-radius:15px;
            cursor:pointer;
            transition:0.3s;
            text-align:center;
        }

        .category-card input{
            display:none;
        }

        .category-card span{
            display:block;
            font-size:1.5rem;
            margin-bottom:5px;
        }

        .category-card p{
            font-size:0.8rem;
            font-weight:700;
            color:var(--text-muted);
        }

        .category-card:has(input:checked){
            border-color:var(--primary);
            background:rgba(74, 222, 128, 0.05);
        }

        .input-group{
            margin-bottom:1rem;
        }

        .input-label{
            font-size:0.75rem;
            font-weight:800;
            color:var(--text-muted);
            text-transform:uppercase;
            margin-left:5px;
        }

        input{
            width:100%;
            padding:1rem;
            border:1.5px solid #e2e8f0;
            border-radius:15px;
            background:#f8fafc;
            margin-top:5px;
            outline:none;
            transition:0.3s;
        }

        input:focus{
            border-color:var(--primary);
            background:white;
            box-shadow:0 0 0 4px rgba(74,222,128,0.1);
        }

        .main-btn{
            width:100%;
            padding:1.2rem;
            background:var(--text-main);
            color:white;
            border:none;
            border-radius:15px;
            font-weight:700;
            font-size:1rem;
            cursor:pointer;
            transition:0.3s;
            margin-top:1rem;
        }

        .main-btn:hover{
            background:black;
            transform:translateY(-2px);
        }

        .hidden{
            display:none;
        }

        .msg{
            margin-top:1rem;
            text-align:center;
            font-weight:700;
        }

        .success{
            color:green;
        }

        .error{
            color:red;
        }
    </style>
</head>
<body>

<div class="container">

    <h2>NutriTrack</h2>
    <p class="subtitle">Cadastro e Login com sistema</p>

    <div class="tabs">
        <button id="btnCadastro" class="active">Cadastrar</button>
        <button id="btnLogin" class="inactive">Entrar</button>
    </div>

    <!-- CADASTRO -->
    <div id="cadastroArea">

        <div class="category-grid">
            <label class="category-card">
                <input type="radio" name="perfil" value="fitness" checked>
                <span>💪</span>
                <p>Fitness</p>
            </label>

            <label class="category-card">
                <input type="radio" name="perfil" value="dia-a-dia">
                <span>🏠</span>
                <p>Dia a dia</p>
            </label>

            <label class="category-card">
                <input type="radio" name="perfil" value="tratamento">
                <span>🩺</span>
                <p>Tratamento</p>
            </label>

            <label class="category-card">
                <input type="radio" name="perfil" value="performance">
                <span>⚡</span>
                <p>Performance</p>
            </label>
        </div>

        <div class="input-group">
            <label class="input-label">E-mail</label>
            <input type="email" id="cadEmail" placeholder="Digite seu e-mail">
        </div>

        <div class="input-group">
            <label class="input-label">Senha</label>
            <input type="password" id="cadSenha" placeholder="Digite sua senha">
        </div>

        <button class="main-btn" onclick="cadastrar()">
            Criar Conta
        </button>

    </div>

    <!-- LOGIN -->
    <div id="loginArea" class="hidden">

        <div class="input-group">
            <label class="input-label">E-mail</label>
            <input type="email" id="loginEmail" placeholder="Digite seu e-mail">
        </div>

        <div class="input-group">
            <label class="input-label">Senha</label>
            <input type="password" id="loginSenha" placeholder="Digite sua senha">
        </div>

        <button class="main-btn" onclick="entrar()">
            Entrar
        </button>

    </div>

    <div id="mensagem" class="msg"></div>

</div>

<script>

    const btnCadastro = document.getElementById("btnCadastro");
    const btnLogin = document.getElementById("btnLogin");

    const cadastroArea = document.getElementById("cadastroArea");
    const loginArea = document.getElementById("loginArea");

    btnCadastro.onclick = () => {
        cadastroArea.classList.remove("hidden");
        loginArea.classList.add("hidden");

        btnCadastro.classList.add("active");
        btnCadastro.classList.remove("inactive");

        btnLogin.classList.add("inactive");
        btnLogin.classList.remove("active");
    }

    btnLogin.onclick = () => {
        loginArea.classList.remove("hidden");
        cadastroArea.classList.add("hidden");

        btnLogin.classList.add("active");
        btnLogin.classList.remove("inactive");

        btnCadastro.classList.add("inactive");
        btnCadastro.classList.remove("active");
    }

    function cadastrar(){

        const email = document.getElementById("cadEmail").value;
        const senha = document.getElementById("cadSenha").value;
        const perfil = document.querySelector('input[name="perfil"]:checked').value;

        const mensagem = document.getElementById("mensagem");

        if(email === "" || senha === ""){
            mensagem.innerHTML = "Preencha todos os campos.";
            mensagem.className = "msg error";
            return;
        }

        // SALVAR NO "BANCO"
        const usuario = {
            email: email,
            senha: senha,
            perfil: perfil
        };

        localStorage.setItem("usuario", JSON.stringify(usuario));

        mensagem.innerHTML = "Conta criada com sucesso!";
        mensagem.className = "msg success";

        document.getElementById("cadEmail").value = "";
        document.getElementById("cadSenha").value = "";
    }

    function entrar(){

        const email = document.getElementById("loginEmail").value;
        const senha = document.getElementById("loginSenha").value;

        const mensagem = document.getElementById("mensagem");

        // PEGAR DO "BANCO"
        const usuarioSalvo = JSON.parse(localStorage.getItem("usuario"));

        if(!usuarioSalvo){
            mensagem.innerHTML = "Nenhum usuário cadastrado.";
            mensagem.className = "msg error";
            return;
        }

        if(email === usuarioSalvo.email && senha === usuarioSalvo.senha){

            mensagem.innerHTML = 
            "Login realizado! Perfil: " + usuarioSalvo.perfil.toUpperCase();

            mensagem.className = "msg success";

            // REDIRECIONAR
            setTimeout(() => {
                window.location.href = "index.html";
            }, 1500);

        } else {

            mensagem.innerHTML = "E-mail ou senha incorretos.";
            mensagem.className = "msg error";
        }
    }

</script>

</body>
</html>
