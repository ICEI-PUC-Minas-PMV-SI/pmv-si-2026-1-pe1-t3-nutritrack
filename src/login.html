<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Criar Conta | NutriTrack</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<!-- Ícones modernos -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

:root{
    --primary: #22c55e;
    --primary-light: #dcfce7;
    --dark: #0f172a;
    --gray: #64748b;
    --border: #e2e8f0;
    --bg: #f8fafc;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Plus Jakarta Sans', sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    background:
    radial-gradient(circle at top left, rgba(34,197,94,0.12), transparent 30%),
    radial-gradient(circle at bottom right, rgba(34,197,94,0.08), transparent 30%),
    var(--bg);
}

.auth-container{
    width:100%;
    max-width:520px;
    background:white;
    border:1px solid rgba(255,255,255,0.5);
    backdrop-filter: blur(10px);
    padding:40px;
    border-radius:32px;
    box-shadow:
    0 10px 40px rgba(15,23,42,0.08);
}

.logo{
    width:65px;
    height:65px;
    margin:auto;
    margin-bottom:20px;
    border-radius:20px;
    background:linear-gradient(135deg, #22c55e, #16a34a);
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
    font-size:1.5rem;
    box-shadow:0 10px 25px rgba(34,197,94,0.25);
}

h2{
    text-align:center;
    font-size:2rem;
    color:var(--dark);
    font-weight:800;
    margin-bottom:8px;
}

.subtitle{
    text-align:center;
    color:var(--gray);
    margin-bottom:35px;
    font-size:0.95rem;
}

.input-label{
    display:block;
    margin-bottom:12px;
    font-size:0.78rem;
    font-weight:800;
    color:var(--gray);
    text-transform:uppercase;
    letter-spacing:1px;
}

/* PERFIS */

.category-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:14px;
    margin-bottom:28px;
}

.category-card{
    position:relative;
    border:1.5px solid var(--border);
    border-radius:22px;
    padding:22px 18px;
    cursor:pointer;
    transition:0.25s ease;
    background:white;
}

.category-card input{
    display:none;
}

.category-card:hover{
    transform:translateY(-3px);
    border-color:#bbf7d0;
    box-shadow:0 10px 20px rgba(0,0,0,0.04);
}

.category-card i{
    font-size:1.4rem;
    margin-bottom:12px;
    color:#16a34a;
}

.category-title{
    display:block;
    font-weight:700;
    color:var(--dark);
    margin-bottom:5px;
}

.category-desc{
    font-size:0.8rem;
    color:var(--gray);
    line-height:1.4;
}

.category-card:has(input:checked){
    border:2px solid var(--primary);
    background:linear-gradient(
    180deg,
    rgba(34,197,94,0.06),
    rgba(34,197,94,0.02)
    );
}

/* INPUTS */

.input-group{
    margin-bottom:18px;
}

.input-wrapper{
    position:relative;
}

.input-wrapper i{
    position:absolute;
    left:18px;
    top:50%;
    transform:translateY(-50%);
    color:#94a3b8;
}

input{
    width:100%;
    height:58px;
    border-radius:18px;
    border:1.5px solid var(--border);
    background:#f8fafc;
    padding-left:50px;
    font-size:0.96rem;
    outline:none;
    transition:0.25s;
}

input:focus{
    border-color:var(--primary);
    background:white;
    box-shadow:0 0 0 5px rgba(34,197,94,0.10);
}

/* BOTÃO */

button{
    width:100%;
    height:58px;
    border:none;
    border-radius:18px;
    background:linear-gradient(135deg, #22c55e, #16a34a);
    color:white;
    font-size:1rem;
    font-weight:700;
    cursor:pointer;
    transition:0.25s;
    margin-top:10px;
    box-shadow:0 12px 24px rgba(34,197,94,0.25);
}

button:hover{
    transform:translateY(-2px);
    filter:brightness(1.03);
}

/* LOGIN */

.switch-auth{
    text-align:center;
    margin-top:22px;
    color:var(--gray);
    font-size:0.92rem;
}

.switch-auth a{
    color:#16a34a;
    font-weight:700;
    text-decoration:none;
}

/* RESPONSIVO */

@media(max-width:550px){

    .auth-container{
        padding:28px;
    }

    .category-grid{
        grid-template-columns:1fr;
    }

}

</style>
</head>
<body>

<div class="auth-container">

    <div class="logo">
        <i class="fa-solid fa-leaf"></i>
    </div>

    <h2>Criar sua conta</h2>

    <p class="subtitle">
        Monte seu perfil e acompanhe sua alimentação de forma inteligente.
    </p>

    <form id="registerForm">

        <label class="input-label">
            Escolha seu objetivo
        </label>

        <div class="category-grid">

            <label class="category-card">

                <input type="radio" name="perfil" value="fitness" checked>

                <i class="fa-solid fa-dumbbell"></i>

                <span class="category-title">
                    Fitness
                </span>

                <span class="category-desc">
                    Treinos, dieta e evolução corporal.
                </span>

            </label>

            <label class="category-card">

                <input type="radio" name="perfil" value="dia-a-dia">

                <i class="fa-solid fa-bowl-food"></i>

                <span class="category-title">
                    Rotina saudável
                </span>

                <span class="category-desc">
                    Alimentação equilibrada no dia a dia.
                </span>

            </label>

            <label class="category-card">

                <input type="radio" name="perfil" value="tratamento">

                <i class="fa-solid fa-heart-pulse"></i>

                <span class="category-title">
                    Saúde
                </span>

                <span class="category-desc">
                    Controle alimentar e acompanhamento.
                </span>

            </label>

            <label class="category-card">

                <input type="radio" name="perfil" value="performance">

                <i class="fa-solid fa-bolt"></i>

                <span class="category-title">
                    Performance
                </span>

                <span class="category-desc">
                    Alta performance e resultados avançados.
                </span>

            </label>

        </div>

        <!-- EMAIL -->

        <div class="input-group">

            <label class="input-label">
                E-mail
            </label>

            <div class="input-wrapper">

                <i class="fa-regular fa-envelope"></i>

                <input 
                    type="email"
                    placeholder="seuemail@gmail.com"
                    required
                >

            </div>

        </div>

        <!-- SENHA -->

        <div class="input-group">

            <label class="input-label">
                Senha
            </label>

            <div class="input-wrapper">

                <i class="fa-solid fa-lock"></i>

                <input 
                    type="password"
                    placeholder="Digite sua senha"
                    required
                >

            </div>

        </div>

        <button type="button" onclick="cadastrar()">
            Criar conta gratuita
        </button>

    </form>

    <p class="switch-auth">
        Já possui conta?
        <a href="login_entrar.html">
            Entrar agora
        </a>
    </p>

</div>

<script>

function cadastrar(){

    const perfil = document.querySelector(
        'input[name="perfil"]:checked'
    ).value;

    alert(
        "Conta criada com sucesso! Perfil: " +
        perfil.toUpperCase()
    );

    window.location.href = "index.html";
}

</script>

</body>
</html>
